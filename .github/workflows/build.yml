# Before using this workflow, add a repository secret named GOOGLE_SERVICES_JSON
# containing the base64-encoded contents of your app/google-services.json file.
#
# To encode the file:
#   macOS: base64 -i app/google-services.json
#   Linux: base64 -w 0 app/google-services.json
#
# Then go to your repository → Settings → Secrets and variables → Actions → New repository secret,
# name it GOOGLE_SERVICES_JSON, and paste the encoded string as the value.

name: Build Debug APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
